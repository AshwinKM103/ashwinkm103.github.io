<nav id="primary-nav" class="site-nav" itemscope itemtype="http://schema.org/SiteNavigationElement" aria-label="Main navigation">
  <ul id="menu-main-navigation" class="menu">
    <!-- Home link -->
    <li class="menu-item">
      <a href="{{ '/' | relative_url }}" itemprop="url">
        <span itemprop="name">{{ site.data.theme.t.home | default: 'Home' }}</span>
      </a>
    </li>

    <!-- Links from _data/navigation.yml (Academic Pages navigation model) -->
    {% for link in site.data.navigation.main %}
      <li class="menu-item">
        <a href="{{ link.url | relative_url }}" itemprop="url"{% if link.url contains '://' %} rel="nofollow noopener noreferrer"{% endif %}>
          <span itemprop="name">{{ link.title | escape }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
