<nav id="primary-nav" class="top-nav" itemscope itemtype="http://schema.org/SiteNavigationElement" aria-label="Main navigation">
  <ul class="top-nav-menu">
    {% for link in site.data.navigation.main %}
      <li class="top-nav-item">
        <a href="{{ link.url | relative_url }}" itemprop="url"{% if link.url contains '://' or link.url contains '.pdf' %} target="_blank" rel="noopener noreferrer"{% endif %}>
          <span itemprop="name">{{ link.title | escape }}</span>
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
